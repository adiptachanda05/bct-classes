
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Website{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(120deg, #f0f4ff 0%, #e9ecef 100%);
            font-family: 'Montserrat', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            color: #222;
        }
        .navbar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 2px 12px rgba(102,126,234,0.08);
            padding: 0;
        }
        .navbar-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 68px;
        }
        .navbar-brand a {
            color: #fff;
            font-size: 1.6em;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .navbar-menu {
            list-style: none;
            display: flex;
            gap: 28px;
            margin: 0;
            padding: 0;
        }
        .navbar-link {
            color: #fff;
            font-weight: 500;
            text-decoration: none;
            font-size: 1.08em;
            transition: color 0.2s;
            position: relative;
        }
        .navbar-link:after {
            content: '';
            display: block;
            width: 0;
            height: 2px;
            background: #fff;
            transition: width 0.3s;
            position: absolute;
            left: 0;
            bottom: -4px;
        }
        .navbar-link:hover:after {
            width: 100%;
        }
        .navbar-link:hover {
            color: #ffe082;
        }
        .content-wrapper {
            max-width: 1100px;
            margin: 36px auto 0 auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(102,126,234,0.10);
            padding: 36px 32px 48px 32px;
            min-height: 60vh;
        }
        footer {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            text-align: center;
            padding: 24px 0 12px 0;
            font-size: 1.08em;
            letter-spacing: 0.5px;
            margin-top: 48px;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -2px 12px rgba(102,126,234,0.08);
        }
        @media (max-width: 900px) {
            .content-wrapper {
                padding: 18px 6vw 32px 6vw;
            }
            .navbar-container {
                padding: 0 8px;
            }
        }
        @media (max-width: 600px) {
            .navbar-container {
                flex-direction: column;
                height: auto;
                padding: 8px 0;
            }
            .navbar-menu {
                gap: 12px;
            }
            .content-wrapper {
                padding: 8vw 2vw 24px 2vw;
            }
            footer {
                font-size: 0.98em;
                padding: 16px 0 8px 0;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="{% url 'newApp:home' %}">Adipta's Site</a>
            </div>
            <ul class="navbar-menu">
                <li><a href="{% url 'newApp:home' %}" class="navbar-link">Home</a></li>
                <li><a href="{% url 'newApp:about' %}" class="navbar-link">About</a></li>
                <li><a href="{% url 'newApp:contact' %}" class="navbar-link">Contact</a></li>
            </ul>
        </div>
    </nav>
    <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>
    <footer>
        &copy; {{ now|default:2026 }} Adipta's Django Website &mdash; Crafted with <span style="color:#ffe082;">&#10084;</span> | Follow on <a href="https://github.com/adiptachanda05" style="color:#ffe082;text-decoration:underline;">GitHub</a>
    </footer>
</body>
</html>
