
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Website{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <a href="{% url 'newApp:home' %}">Adipta's Site</a>
            </div>
            <ul class="navbar-menu">
                <li><a href="{% url 'newApp:home' %}" class="navbar-link">Home</a></li>
                <li><a href="{% url 'newApp:about' %}" class="navbar-link">About</a></li>
                <li><a href="{% url 'newApp:contact' %}" class="navbar-link">Contact</a></li>
            </ul>
        </div>
    </nav>
    <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>
    
</body>
</html>
